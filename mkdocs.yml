site_name: moTSart
site_url: https://heid-lab.github.io/motsart
repo_url: https://github.com/heid-lab/motsart
repo_name: heid-lab/motsart

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - Configuration: configuration/index.md
  - Pipeline:
      - Overview: pipeline/overview.md
      - Complex Finder: pipeline/complex-finder.md
      - Path Guessers: pipeline/path-guessers.md
      - Learning: pipeline/learning.md
      - Validator: pipeline/validator.md
  - Cluster: cluster/index.md
  - Paper Reproduction: pipeline/paper-reproduction.md
  - Contributing: contributing.md
  - Reference: reference/

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true
